{% extends "quiz/base.html" %}
{% load ad_tags %}

{% block content %}

{% if is_autoplay %}
  <h2>自動再生完了</h2>
  <p style="color: #7ec8e3;">{{ total }}問を自動再生しました。</p>
  <p style="color: #888; font-size: 0.9rem;">※ 自動再生モードの回答は正解/不正解にカウントされません。</p>
{% else %}
  <h2>結果</h2>
  <p>{{ total }}問中 {{ correct }}問正解！</p>
{% endif %}

{% adblock %}
<!-- 広告プレースホルダー -->
<div style="margin: 24px 0;">
  <a href="https://www.google.com/" target="_blank" rel="noopener"
     style="display: block; text-decoration: none;">
    <div style="
      width: 100%;
      max-width: 468px;
      height: 90px;
      background: #e8e8e8;
      border: 1px solid #ccc;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
    ">広告</div>
  </a>
</div>
{% endadblock %}

<a href="/history/?quiz_id={{ quiz_id }}&amp;category={{ current_category }}">
  <button>今回の解答履歴を見る</button>
</a>
<a href="/{{ current_category }}/history/">
  <button>過去の履歴一覧へ</button>
</a>
<a href="/{{ current_category }}/">
  <button>問題選択に戻る</button>
</a>

{% endblock %}
