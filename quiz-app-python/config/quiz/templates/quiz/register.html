{% extends "quiz/base.html" %}

{% block content %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<div style="max-width:420px; margin:0 auto; padding:30px 0;">
  <div style="background:#f8f9fa; border-radius:10px; padding:30px;">

    <h2 style="text-align:center; margin-bottom:6px; font-size:1.1rem;">新規登録</h2>
    <p style="text-align:center; color:#888; font-size:0.85rem; margin-bottom:24px;">
      登録後、確認コードを入力してアカウントを有効化します
    </p>

    {% if request.GET.expired %}
      <p style="color:#c0392b; background:#fdecea; padding:10px 14px; border-radius:6px; font-size:0.88rem; margin-bottom:16px;">
        認証コードの有効期限が切れました。もう一度登録してください。
      </p>
    {% endif %}

    {% if errors %}
      <ul style="color:#c0392b; background:#fdecea; padding:12px 16px 12px 28px; border-radius:6px; font-size:0.88rem; margin-bottom:16px;">
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div style="margin-bottom:14px;">
        <label style="display:block; font-size:0.85rem; color:#555; margin-bottom:5px; background:none; padding:0;">ユーザーID</label>
        <input type="text" name="username" required autofocus
               value="{{ request.POST.username }}"
               style="width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.95rem; box-sizing:border-box;">
      </div>

      <div style="margin-bottom:14px;">
        <label style="display:block; font-size:0.85rem; color:#555; margin-bottom:5px; background:none; padding:0;">メールアドレス</label>
        <input type="email" name="email" required
               value="{{ request.POST.email }}"
               style="width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.95rem; box-sizing:border-box;">
      </div>

      <div style="margin-bottom:14px;">
        <label style="display:block; font-size:0.85rem; color:#555; margin-bottom:5px; background:none; padding:0;">パスワード（8文字以上）</label>
        <input type="password" name="password" required
               style="width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.95rem; box-sizing:border-box;">
      </div>

      <div style="margin-bottom:22px;">
        <label style="display:block; font-size:0.85rem; color:#555; margin-bottom:5px; background:none; padding:0;">パスワード（確認）</label>
        <input type="password" name="password2" required
               style="width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.95rem; box-sizing:border-box;">
      </div>

      <div style="margin-bottom:18px; display:flex; justify-content:center;">
        <div class="g-recaptcha" data-sitekey="{{ recaptcha_public_key }}"></div>
      </div>

      <button type="submit" style="width:100%; font-size:1rem; padding:12px;">
        確認コードを発行
      </button>
    </form>

    <p style="text-align:center; margin-top:16px; font-size:0.88rem; color:#666;">
      すでにアカウントをお持ちの方は
      <a href="/login/" style="color:#40739e;">ログイン</a>
    </p>

  </div>
</div>
{% endblock %}
