{% extends "quiz/base.html" %}

{% block content %}
<div style="max-width:420px; margin:0 auto; padding:30px 0;">
  <div style="background:#f8f9fa; border-radius:10px; padding:30px; text-align:center;">

    <div style="font-size:2.5rem; margin-bottom:12px;">🔐</div>
    <h2 style="margin-bottom:10px; font-size:1.1rem;">確認コードを入力</h2>
    <p style="color:#666; font-size:0.88rem; margin-bottom:6px;">
      登録メールアドレス：<strong>{{ email }}</strong>
    </p>

    {% if demo_code %}
    <div style="background:#fff8e1; border:2px solid #f9a825; border-radius:8px;
                padding:14px 18px; margin-bottom:20px; text-align:center;">
      <p style="color:#e65100; font-size:0.78rem; font-weight:bold; margin:0 0 6px;">
        ⚠ ポートフォリオ デモ表示（本番ではメール送信）
      </p>
      <p style="color:#333; font-size:0.82rem; margin:0 0 8px;">確認コード</p>
      <p style="font-size:2rem; font-weight:bold; letter-spacing:0.4em; color:#333; margin:0;">
        {{ demo_code }}
      </p>
    </div>
    {% endif %}

    {% if error %}
      <p style="color:#c0392b; background:#fdecea; padding:10px 14px; border-radius:6px; font-size:0.88rem; margin-bottom:16px; text-align:left;">
        {{ error }}
      </p>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:0.85rem; color:#555; margin-bottom:8px; background:none; padding:0; text-align:left;">
          6桁の確認コード
        </label>
        <input type="text" name="code" required autofocus
               maxlength="6" pattern="\d{6}"
               placeholder="123456"
               style="width:100%; padding:12px; border:1px solid #ccc; border-radius:6px;
                      font-size:1.4rem; text-align:center; letter-spacing:0.3em; box-sizing:border-box;">
      </div>

      <button type="submit" style="width:100%; font-size:1rem; padding:12px;">
        認証して登録を完了する
      </button>
    </form>

    <p style="margin-top:20px; font-size:0.82rem; color:#aaa;">
      コードが届かない場合は
      <a href="/register/" style="color:#40739e;">最初からやり直す</a>
    </p>

  </div>
</div>
{% endblock %}
