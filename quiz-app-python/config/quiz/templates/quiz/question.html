{% extends "quiz/base.html" %}

{% block content %}

<h2>{{ question.text }}</h2>

{% if is_autoplay %}
<div id="autoplay-bar" style="display:flex; align-items:center; gap:14px;
     background:#1e3a5f; border:1px solid #2d5986; border-radius:8px;
     padding:10px 16px; margin-bottom:16px; font-size:0.88rem;">
  <span style="color:#7ec8e3;">🤖 自動再生</span>
  <span id="autoplay-status" style="color:#ccc; flex:1;">
    解答まで <strong id="autoplay-countdown">{{ autoplay_check_sec }}</strong> 秒
  </span>
  <button type="button" id="pause-btn"
          style="font-size:0.8rem; padding:4px 14px; background:#2d5986;
                 color:#fff; border:none; border-radius:5px; cursor:pointer;"
          onclick="togglePause()">⏸ 一時停止</button>
</div>
{% endif %}

<form method="post" action="/answer/" id="answer-form">
  <input type="hidden" name="quiz_id" value="{{ quiz_id }}">
  <input type="hidden" name="question_id" value="{{ q_id }}">
  <input type="hidden" name="two_choice_mode" id="two-choice-mode" value="0">
  <input type="hidden" name="checked_before" id="checked-before" value="0">
  {% csrf_token %}

  <!-- 正解データ（JS 参照用） -->
  <span id="correct-answer" data-answer="{{ question.answer }}" style="display:none;"></span>

  <!-- 選択肢 -->
  <div id="choices-area"{% if is_autoplay %} style="pointer-events:none;"{% endif %}>
    {% for choice in question.choices %}
      <div>
        <label id="label-{{ forloop.counter0 }}">
          <input type="radio" name="answer" value="{{ choice }}"
            {% if choice == selected %}checked{% endif %}
            {% if is_autoplay %}disabled{% endif %}>
          {{ choice }}
        </label>
      </div>
    {% endfor %}
  </div>

  <br>

  <!-- ボタン（常に固定位置） -->
  <button type="button" id="two-choice-btn"
          onclick="useHintTwoChoice()"
          style="background:#b8860b; color:#fff;">🎯 二択に絞る（正解+3XP）</button>
  <button type="button" id="check-btn" onclick="checkAnswer()">解答を見る</button>
  {% if show_prev %}
    <button type="submit" name="action" value="prev">前へ</button>
  {% endif %}
  <button type="submit" id="next-btn" name="action" value="next">次へ</button>

  <!-- 解答結果（ボタンの下に表示） -->
  <div id="result-area" style="display:none; margin-top:16px;">
    <p id="result-text" style="font-weight:bold;"></p>
    <p id="explanation-text" style="background:#f1f2f6; padding:10px; border-radius:6px;">
      {{ question.explanation }}
    </p>
  </div>

</form>

<script>
var _checked = false;
var _phaseTimer = null;
var _paused = false;

{% if is_autoplay %}
var CHECK_SEC = {{ autoplay_check_sec }};
var NEXT_SEC  = {{ autoplay_next_sec }};
var IS_VOICE    = {% if is_voice %}true{% else %}false{% endif %};
var VOICE_RATE  = {{ voice_rate|default:"1.0" }};
var _questionText = '{{ question.text|escapejs }}';

function setStatus(html) {
  document.getElementById('autoplay-status').innerHTML = html;
}

function startTimer(seconds, onComplete) {
  var remaining = seconds;
  clearTimeout(_phaseTimer);
  (function updateEl() {
    var el = document.getElementById('autoplay-countdown');
    if (el) el.textContent = remaining;
  })();

  function tick() {
    if (_paused) { _phaseTimer = setTimeout(tick, 200); return; }
    remaining--;
    var el = document.getElementById('autoplay-countdown');
    if (el) el.textContent = remaining;
    if (remaining <= 0) { onComplete(); }
    else { _phaseTimer = setTimeout(tick, 1000); }
  }
  _phaseTimer = setTimeout(tick, 1000);
}

// SpeechSynthesis ラッパー。音声無効時は即コールバック
function speak(text, onEnd) {
  if (!IS_VOICE || !window.speechSynthesis) { onEnd(); return; }
  speechSynthesis.cancel();
  // cancel が反映される前に speak を呼ぶと無視されるブラウザがあるため少し待つ
  setTimeout(function() {
    var utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP';
    utt.rate = VOICE_RATE;
    utt.onend   = onEnd;
    utt.onerror = function() { onEnd(); };
    speechSynthesis.speak(utt);
  }, 50);
}

function startCheckPhase() {
  if (IS_VOICE) {
    setStatus('🔊 問題を読み上げています...');
    speak(_questionText, function() {
      setStatus('解答まで <strong id="autoplay-countdown">' + CHECK_SEC + '</strong> 秒');
      startTimer(CHECK_SEC, function() { checkAnswer(true); });
    });
  } else {
    setStatus('解答まで <strong id="autoplay-countdown">' + CHECK_SEC + '</strong> 秒');
    startTimer(CHECK_SEC, function() { checkAnswer(true); });
  }
}

// checkAnswer の直後に呼ばれる（autoplay 専用）
function afterCheckPhase() {
  if (IS_VOICE) {
    var correct = document.getElementById('correct-answer').dataset.answer;
    setStatus('🔊 正解を読み上げています...');
    speak(correct, startNextPhase);
  } else {
    startNextPhase();
  }
}

function startNextPhase() {
  setStatus('次の問題まで <strong id="autoplay-countdown">' + NEXT_SEC + '</strong> 秒');
  startTimer(NEXT_SEC, function() {
    document.getElementById('next-btn').click();
  });
}

function togglePause() {
  _paused = !_paused;
  document.getElementById('pause-btn').textContent = _paused ? '▶ 再開' : '⏸ 一時停止';
  if (IS_VOICE && window.speechSynthesis) {
    if (_paused) speechSynthesis.pause();
    else speechSynthesis.resume();
  }
}

window.addEventListener('DOMContentLoaded', startCheckPhase);
{% endif %}

function useHintTwoChoice() {
  if (_checked) return;
  var btn = document.getElementById('two-choice-btn');
  if (btn.disabled) return;

  var correct = document.getElementById('correct-answer').dataset.answer;
  var labels  = document.querySelectorAll('#choices-area label');
  var incorrect = [];
  labels.forEach(function(label) {
    var radio = label.querySelector('input[type="radio"]');
    if (radio.value !== correct) incorrect.push(label);
  });

  var toGrayCount = labels.length - 2;
  if (toGrayCount <= 0) return;

  // Fisher–Yates shuffle
  for (var i = incorrect.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = incorrect[i]; incorrect[i] = incorrect[j]; incorrect[j] = tmp;
  }

  incorrect.slice(0, toGrayCount).forEach(function(label) {
    var radio = label.querySelector('input[type="radio"]');
    if (radio.checked) radio.checked = false;
    radio.disabled = true;
    label.style.opacity = '0.4';
    label.style.cursor = 'not-allowed';
    label.style.backgroundColor = '#bbb';
  });

  document.getElementById('two-choice-mode').value = '1';
  btn.disabled = true;
  btn.style.opacity = '0.5';
  btn.style.cursor = 'default';
}

function checkAnswer(autoTriggered) {
  if (_checked) return;
  _checked = true;
  document.getElementById('checked-before').value = '1';
  clearTimeout(_phaseTimer);

  var correct  = document.getElementById('correct-answer').dataset.answer;
  var selected = document.querySelector('input[name="answer"]:checked');
  var labels   = document.querySelectorAll('#choices-area label');

  labels.forEach(function(label) {
    var radio = label.querySelector('input[type="radio"]');
    if (radio.value === correct) {
      label.style.backgroundColor = '#c8f7c5';
    } else if (selected && radio.value === selected.value) {
      label.style.backgroundColor = '#f7c5c5';
    }
  });

  var resultText = document.getElementById('result-text');
  if (!selected) {
    resultText.textContent = '⚠️ 未回答（正解：' + correct + '）';
  } else if (selected.value === correct) {
    resultText.textContent = '✅ 正解！';
  } else {
    resultText.textContent = '❌ 不正解（正解：' + correct + '）';
  }

  document.getElementById('result-area').style.display = 'block';
  document.getElementById('check-btn').disabled = true;

  {% if is_autoplay %}
  afterCheckPhase();
  {% endif %}
}
</script>

{% endblock %}
