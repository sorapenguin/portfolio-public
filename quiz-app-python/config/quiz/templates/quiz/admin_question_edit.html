<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>問題編集 #{{ question.id }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: sans-serif; font-size: 0.9rem; }
    header { background: #16213e; border-bottom: 1px solid #0f3460;
             padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.1rem; color: #e94560; flex: 1; }
    header a { color: #aaa; text-decoration: none; font-size: 0.82rem; }
    header a:hover { color: #fff; }
    .container { max-width: 720px; margin: 30px auto; padding: 0 20px; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 28px 30px; }
    h2 { font-size: 1rem; color: #ccc; margin-bottom: 24px; }
    label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    input[type=text], textarea {
      width: 100%; padding: 9px 12px; background: #0f3460; border: 1px solid #1e3a6e;
      border-radius: 6px; color: #fff; font-size: 0.9rem; margin-bottom: 18px;
      font-family: inherit;
    }
    textarea { resize: vertical; }
    input[type=text]:focus, textarea:focus { outline: none; border-color: #e94560; }
    .hint { font-size: 0.75rem; color: #666; margin-top: -14px; margin-bottom: 14px; }
    .actions { display: flex; gap: 12px; margin-top: 6px; }
    .btn { padding: 9px 22px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .btn-save   { background: #e94560; color: #fff; }
    .btn-save:hover { background: #c73652; }
    .btn-cancel { background: #0f3460; color: #aaa; text-decoration: none;
                  display: inline-flex; align-items: center; }
    .btn-cancel:hover { background: #1a4a80; color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>問題編集 #{{ question.id }}</h1>
  <a href="{{ next_url }}">← 一覧に戻る</a>
</header>

<div class="container">
  <div class="card">
    <h2>問題を編集</h2>
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}">

      <label>カテゴリ</label>
      <input type="text" name="category" value="{{ question.category }}" placeholder="例: python">

      <label>問題文</label>
      <textarea name="text" rows="3">{{ question.text }}</textarea>

      <label>選択肢（1行に1つ）</label>
      <textarea name="choices_text" rows="5">{{ choices_text }}</textarea>
      <p class="hint">1行に1つの選択肢を入力してください。</p>

      <label>正解（選択肢と完全一致）</label>
      <input type="text" name="answer" value="{{ question.answer }}">

      <label>解説（任意）</label>
      <textarea name="explanation" rows="3">{{ question.explanation }}</textarea>

      <div class="actions">
        <button type="submit" class="btn btn-save">保存</button>
        <a href="{{ next_url }}" class="btn btn-cancel">キャンセル</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
