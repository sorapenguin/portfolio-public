<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理パネル ログイン</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: sans-serif;
           display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px;
            padding: 40px 36px; width: 340px; }
    h1 { font-size: 1.2rem; color: #e94560; margin-bottom: 6px; }
    p.sub { font-size: 0.8rem; color: #888; margin-bottom: 28px; }
    label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 6px; }
    input[type=password] {
      width: 100%; padding: 10px 12px; background: #0f3460; border: 1px solid #333;
      border-radius: 6px; color: #fff; font-size: 0.95rem; margin-bottom: 18px;
    }
    button { width: 100%; padding: 11px; background: #e94560; border: none;
             border-radius: 6px; color: #fff; font-size: 1rem; cursor: pointer; }
    button:hover { background: #c73652; }
    .error { color: #e94560; font-size: 0.85rem; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>管理パネル</h1>
    <p class="sub">管理者専用ログイン</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label>パスワード</label>
      <input type="password" name="password" autofocus>
      <button type="submit">ログイン</button>
    </form>
  </div>
</body>
</html>
