<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | ソラペンパズル</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="/">ソラペンパズル</a>
    </div>
  </header>
  <main class="container">
    <section class="panel">
      <h1>ログイン</h1>
      <p class="muted">ユーザー名だけで遊べます。メールアドレス不要。別の端末でも同じ名前でログインできます。</p>
      <form class="form" id="loginForm">
        <label>
          ユーザー名
          <input id="username" autocomplete="username" required>
        </label>
        <button type="submit">ログイン</button>
        <button class="secondary" id="newAccount" type="button">初めての方はこちら</button>
        <p class="error" id="message"></p>
      </form>
    </section>
  </main>
  <script type="module">
    import { initOnFirstVisit, loginWithUsername, logout } from './js/auth.js';

    const form = document.getElementById('loginForm');
    const input = document.getElementById('username');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      try {
        await loginWithUsername(input.value.trim());
        location.href = '/index.html';
      } catch (error) {
        console.error(error);
        message.textContent = 'ログインできませんでした。';
      }
    });

    document.getElementById('newAccount').addEventListener('click', async () => {
      message.textContent = '';
      try {
        logout();
        await initOnFirstVisit();
        location.href = '/index.html';
      } catch (error) {
        console.error(error);
        message.textContent = '新しいアカウントを作成できませんでした。';
      }
    });
  </script>
</body>
</html>
