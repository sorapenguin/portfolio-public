<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ソラペンパズル</title>
  <link rel="stylesheet" href="/css/style.css">
  <meta name="google-adsense-account" content="ca-pub-XXXXXXXXXXXXXXXXX">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="/">ソラペンパズル</a>
      <nav class="nav">
        <a href="/nonogram/list.html">ノノグラム</a>
        <a href="/nurikabe/list.html">ヌリカベ</a>
        <a href="/kakuro/list.html">カックロ</a>
        <a href="/pixelart/list.html">ピクセルアート</a>
        <button class="secondary" type="button" id="showUser">ユーザー名を表示</button>
        <span data-username style="display:none"></span>
        <button class="secondary" type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="ad-slot ad-top" data-ad="top">
      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
           data-ad-slot="0000000000"
           data-ad-format="auto"
           data-ad-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
    </div>
    <div class="card-grid">
      <section class="card">
        <h2>ノノグラム</h2>
        <p class="muted">数字を手がかりにマスを塗る定番パズル。</p>
        <a class="button" href="/nonogram/list.html">遊ぶ</a>
      </section>
      <section class="card">
        <h2>ヌリカベ</h2>
        <p class="muted">島と海を分けて盤面を完成させるロジックパズル。</p>
        <a class="button" href="/nurikabe/list.html">遊ぶ</a>
      </section>
      <section class="card">
        <h2>カックロ</h2>
        <p class="muted">数字の合計を手がかりにマスを埋めるクロスワード型ロジックパズル。</p>
        <a class="button" href="/kakuro/list.html">遊ぶ</a>
      </section>
      <section class="card">
        <h2>ピクセルアート</h2>
        <p class="muted">数字のヒントを頼りにマスを塗り完成させるカラーパズル。</p>
        <a class="button" href="/pixelart/list.html">遊ぶ</a>
      </section>
    </div>
  </main>
  <script type="module">
    import { initOnFirstVisit, applyHeaderUser } from './js/auth.js';

    document.getElementById('showUser').addEventListener('click', function() {
      var el = document.querySelector('[data-username]');
      if (el) el.style.display = '';
      document.getElementById('showUser').style.display = 'none';
    });

    try {
      await initOnFirstVisit();
      applyHeaderUser();
    } catch (error) {
      console.error(error);
      location.href = '/login.html';
    }
  </script>
</body>
</html>
