<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カックロ | ソラペンパズル</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="/">ソラペンパズル</a>
      <nav class="nav">
        <a href="/nonogram/list.html">ノノグラム</a>
        <a href="/nurikabe/list.html">ヌリカベ</a>
        <a href="/kakuro/list.html">カックロ</a>
        <a href="/pixelart/list.html">ピクセルアート</a>
        <button class="secondary" type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="ad-slot ad-top" data-ad="top">
      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
           data-ad-slot="0000000000"
           data-ad-format="auto"
           data-ad-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
    </div>
    <div class="tabs" id="tabs"></div>
    <section class="panel">
      <strong id="progressText">読み込み中</strong>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    </section>
    <div class="puzzle-list" id="list"></div>
    <div class="ad-slot ad-bottom" data-ad="bottom">
      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
           data-ad-slot="0000000001"
           data-ad-format="auto"
           data-ad-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
    </div>
  </main>
  <script>
  Promise.all([
    import('../js/auth.js'),
    import('../js/api.js')
  ]).then(function(mods) {
    var requireAuth = mods[0].requireAuth;
    var applyHeaderUser = mods[0].applyHeaderUser;
    var fetchJson = mods[1].fetchJson;

    if (!requireAuth()) return;
    applyHeaderUser();

    var params = new URLSearchParams(location.search);
    var size = params.get('size') || '6x6';
    var SIZES = ['6x6', '9x9', '12x12'];
    if (SIZES.indexOf(size) < 0) { size = '6x6'; }

    var tabs = document.getElementById('tabs');
    SIZES.forEach(function(s) {
      var a = document.createElement('a');
      a.className = 'button tab' + (s === size ? ' active' : '');
      a.href = '?size=' + s;
      a.textContent = s;
      tabs.appendChild(a);
    });

    function escapeHtml(v) {
      var m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return String(v).replace(/[&<>"']/g, function(c) { return m[c]; });
    }

    function cardHtml(p) {
      var stage = p.stage;
      var done = p.cleared || localStorage.getItem('kakuro_done_' + size + '_' + stage) === '1';
      var diff = p.difficulty_label || ('L' + p.difficulty);
      var badge = done ? 'クリア' : diff;
      var badgeStyle = done ? ' style="background:#d1fae5;color:#065f46"' : '';
      return '<a class="puzzle-card" href="/kakuro/puzzle.html?size=' + escapeHtml(size) + '&amp;stage=' + stage + '">' +
        '<strong>#' + stage + '</strong>' +
        '<div class="muted">' + escapeHtml(size) + ' <span class="badge"' + badgeStyle + '>' + escapeHtml(badge) + '</span></div>' +
        '</a>';
    }

    fetchJson('/kakuro/puzzles?size=' + size)
      .then(function(puzzles) {
        puzzles = puzzles || [];
        var total = puzzles.length;
        var clearedCount = 0;
        puzzles.forEach(function(p) {
          if (p.cleared || localStorage.getItem('kakuro_done_' + size + '_' + p.stage) === '1') { clearedCount++; }
        });

        var unlockedKey = 'kakuro_unlocked_' + size;
        var unlockedMax = Number(localStorage.getItem(unlockedKey) || 20);
        if (unlockedMax < 20) { unlockedMax = 20; }
        if (clearedCount >= unlockedMax && unlockedMax < total) {
          unlockedMax = Math.min(total, unlockedMax + 20);
          localStorage.setItem(unlockedKey, String(unlockedMax));
        }
        unlockedMax = Math.min(unlockedMax, total);

        document.getElementById('progressText').textContent = 'クリア: ' + clearedCount + '問 / 解放済み: ' + unlockedMax + '問';
        document.getElementById('progressBar').style.width = (unlockedMax > 0 ? Math.round(clearedCount / unlockedMax * 100) : 0) + '%';
        var visible = puzzles.slice(0, unlockedMax).filter(function(p) {
          return !(p.cleared || localStorage.getItem('kakuro_done_' + size + '_' + p.stage) === '1');
        });
        document.getElementById('list').innerHTML = visible.map(cardHtml).join('') || '<p class="muted">全問クリア！</p>';
      })
      .catch(function(e) {
        document.getElementById('list').innerHTML = '<p class="error">エラー: ' + e + '</p>';
      });
  });
  </script>
</body>
</html>
