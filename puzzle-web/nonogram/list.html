<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ノノグラム | ソラペンパズル</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="/">ソラペンパズル</a>
      <nav class="nav">
        <a href="/nonogram/list.html">ノノグラム</a>
        <a href="/nurikabe/list.html">ヌリカベ</a>
        <a href="/kakuro/list.html">カックロ</a>
        <a href="/pixelart/list.html">ピクセルアート</a>
        <button class="secondary" type="button" id="showUser">ユーザー名を表示</button>
        <span data-username style="display:none"></span>
        <button class="secondary" type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="ad-slot ad-top" data-ad="top">
      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
           data-ad-slot="0000000000"
           data-ad-format="auto"
           data-ad-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
    </div>
    <div class="tabs" id="tabs"></div>
    <section class="panel">
      <strong id="progressText">読み込み中</strong>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    </section>
    <div class="puzzle-list" id="list"></div>
    <div class="ad-slot ad-bottom" data-ad="bottom">
      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
           data-ad-slot="0000000001"
           data-ad-format="auto"
           data-ad-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
    </div>
  </main>
  <script type="module">
    import { requireAuth, applyHeaderUser } from '../js/auth.js';
    import { fetchJson } from '../js/api.js';

    if (requireAuth()) {
      applyHeaderUser();
      document.getElementById('showUser').addEventListener('click', function() {
        var el = document.querySelector('[data-username]');
        if (el) el.style.display = '';
        document.getElementById('showUser').style.display = 'none';
      });
      const params = new URLSearchParams(location.search);
      const rows = Number(params.get('rows') || 10);
      renderTabs(rows);
      loadList(rows);
    }

    function renderTabs(rows) {
      const tabs = document.getElementById('tabs');
      [5, 10, 15].forEach((size) => {
        const a = document.createElement('a');
        a.className = `button tab${size === rows ? ' active' : ''}`;
        a.href = `?rows=${size}`;
        a.textContent = `${size}x${size}`;
        tabs.appendChild(a);
      });
    }

    async function loadList(rows) {
      const list = document.getElementById('list');
      try {
        const data = await fetchJson(`/nonogram/list?rows=${rows}`);
        const puzzles = (data?.puzzles || data?.items || data || []).slice(0, 5);
        const clearedCount = Number(data?.clearedCount || 0);
        const unlockedMax = Number(data?.unlockedMax || puzzles.length || 1);
        document.getElementById('progressText').textContent = `クリア済み: ${clearedCount}問 / 解放済み: ${unlockedMax}問`;
        document.getElementById('progressBar').style.width = `${Math.min(100, Math.round((clearedCount / unlockedMax) * 100))}%`;
        list.innerHTML = puzzles.map((p, index) => cardHtml(p, rows, index)).join('') || '<p class="muted">パズルがありません。</p>';
      } catch (error) {
        console.error(error);
        list.innerHTML = '<p class="error">一覧を読み込めませんでした。</p>';
      }
    }

    function cardHtml(p, rows, index) {
      const title = p.title || `Puzzle ${p.stageNumber ?? index + 1}`;
      const stage = p.stageNumber ?? index + 1;
      const cols = p.cols ?? rows;
      const badge = p.cleared ? 'クリア済み' : '未挑戦';
      return `<a class="puzzle-card" href="/nonogram/puzzle.html?rows=${rows}&stage=${stage}">
        <strong>#${stage} ${escapeHtml(title)}</strong>
        <div class="muted">${rows}x${cols} <span class="badge">${badge}</span></div>
      </a>`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }
  </script>
</body>
</html>
