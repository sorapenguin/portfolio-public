<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ピクセルアート | ソラペンパズル</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="/">ソラペンパズル</a>
      <nav class="nav">
        <a href="/nonogram/list.html">ノノグラム</a>
        <a href="/nurikabe/list.html">ヌリカベ</a>
        <a href="/kakuro/list.html">カックロ</a>
        <a href="/pixelart/list.html">ピクセルアート</a>
        <button class="secondary" type="button" id="showUser">ユーザー名を表示</button>
        <span data-username style="display:none"></span>
        <button class="secondary" type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="ad-slot ad-top" data-ad="top">
      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
           data-ad-slot="0000000000"
           data-ad-format="auto"
           data-ad-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
    </div>
    <div class="tabs" id="tabs"></div>
    <section class="panel">
      <strong id="progressText">読み込み中</strong>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    </section>
    <div class="puzzle-list" id="list"></div>
    <p class="error" id="message"></p>
    <div class="ad-slot ad-bottom" data-ad="bottom">
      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
           data-ad-slot="0000000001"
           data-ad-format="auto"
           data-ad-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      -->
    </div>
  </main>
  <script>
  Promise.all([
    import('../js/auth.js'),
    import('../js/api.js')
  ]).then(function(mods) {
    var requireAuth = mods[0].requireAuth;
    var applyHeaderUser = mods[0].applyHeaderUser;
    var fetchJson = mods[1].fetchJson;
    var list = document.getElementById('list');

    if (!requireAuth()) return;
    applyHeaderUser();
    document.getElementById('showUser').addEventListener('click', function() {
      var el = document.querySelector('[data-username]');
      if (el) el.style.display = '';
      document.getElementById('showUser').style.display = 'none';
    });

    var sz = Number(new URLSearchParams(location.search).get('size') || 8);
    if (sz !== 8 && sz !== 16) { sz = 8; }

    var tabs = document.getElementById('tabs');
    [8, 16].forEach(function(s) {
      var a = document.createElement('a');
      a.className = 'button tab' + (s === sz ? ' active' : '');
      a.href = '?size=' + s;
      a.textContent = s + 'x' + s;
      tabs.appendChild(a);
    });

    function escapeHtml(v) {
      var ch = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return String(v).replace(/[&<>"']/g, function(c) { return ch[c]; });
    }

    fetchJson('/pixelart/puzzles').then(function(data) {
      var all = Array.isArray(data) ? data : ((data && data.puzzles) || []);
      var puzzles = all.filter(function(p) { return (p.width || 8) === sz; });

      if (!puzzles.length) {
        document.getElementById('progressText').textContent = '-';
        list.innerHTML = '<p class="muted">パズルがありません。</p>';
        return;
      }

      var total = puzzles.length;
      var clearedCount = 0;
      puzzles.forEach(function(p) {
        if (p.cleared || localStorage.getItem('pixelart_done_' + p.id) === '1') { clearedCount++; }
      });

      var unlockedKey = 'pixelart_unlocked_' + sz;
      var unlockedMax = Number(localStorage.getItem(unlockedKey) || 20);
      if (unlockedMax < 20) { unlockedMax = 20; }
      if (clearedCount >= unlockedMax && unlockedMax < total) {
        unlockedMax = Math.min(total, unlockedMax + 20);
        localStorage.setItem(unlockedKey, String(unlockedMax));
      }
      unlockedMax = Math.min(unlockedMax, total);

      document.getElementById('progressText').textContent = 'クリア: ' + clearedCount + '問 / 解放済み: ' + unlockedMax + '問';
      document.getElementById('progressBar').style.width = (unlockedMax > 0 ? Math.round(clearedCount / unlockedMax * 100) : 0) + '%';

      var shown = puzzles.slice(0, unlockedMax).filter(function(p) {
        return !(p.cleared || localStorage.getItem('pixelart_done_' + p.id) === '1');
      });
      list.innerHTML = shown.map(function(p) {
        var title = p.title || ('Puzzle #' + p.id);
        return '<a class="puzzle-card" href="/pixelart/puzzle.html?id=' + p.id + '">' +
          '<strong>' + escapeHtml(title) + '</strong>' +
          '<div class="muted">' + sz + 'x' + sz + '</div>' +
          '</a>';
      }).join('') || '<p class="muted">全問クリア！</p>';
    }).catch(function(e) {
      list.innerHTML = '<p class="error">Error: ' + e + '</p>';
    });
  }).catch(function(e) {
    document.getElementById('message').textContent = 'Error: ' + e;
  });
  </script>
</body>
</html>
