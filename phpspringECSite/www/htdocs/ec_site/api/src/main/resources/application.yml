server:
  port: 8080
  error:
    include-message: never
  tomcat:
    accesslog:
      enabled: true
      directory: /var/log/spring
      prefix: access_log
      suffix: .txt
      pattern: combined   # fail2ban フィルターはこのフォーマットを前提とする

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/ecsitephp}
    username: ${SPRING_DATASOURCE_USERNAME:ec_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ec_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      # G: コネクションプールを明示的にチューニング
      maximum-pool-size: 10        # 同時接続の上限（DBサーバーのmax_connectionsと要調整）
      minimum-idle: 2              # アイドル時の最小確保数（メモリ節約）
      connection-timeout: 20000    # 接続取得タイムアウト 20秒
      idle-timeout: 300000         # アイドル接続を 5分で切断
      max-lifetime: 600000         # 接続の最大寿命 10分（DB 側 wait_timeout より短く）
      leak-detection-threshold: 60000  # 60秒保持されたままの接続をリーク警告
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 1
  jackson:
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

upload:
  dir: ${UPLOAD_DIR:/app/uploads}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8004}

logging:
  level:
    com.ec.api: INFO
    org.springframework.security: WARN
