<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InfraLab</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="InfraLab.Client.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        エラーが発生しました。
        <a href="." class="reload">再読み込み</a>
        <span class="dismiss">✕</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script>
        window.infralab = {
            scrollToTop: function (el) { if (el) el.scrollTop = 0; },
            ls: {
                get: function (key) { try { return localStorage.getItem(key); } catch (e) { return null; } },
                set: function (key, value) { try { localStorage.setItem(key, value); } catch (e) { } }
            },
            openCollapsiblesIfWide: function () {
                if (window.innerWidth >= 768) {
                    document.querySelectorAll('.attempt-collapsible').forEach(function (d) { d.open = true; });
                }
            }
        };
    </script>
</body>

</html>
